<!DOCTYPE html>
<html>
<head>
  <title>Northstar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Northstar</h1>
  <p class="subtitle">Remove distractions. Focus forward.</p>

  <input id="goal" placeholder="What is your main goal right now?">

  <textarea id="distractions" placeholder="What is distracting you? (one per line)"></textarea>

  <button onclick="focusMode()">Enter Focus Mode</button>
  <button onclick="resetMode()">Reset</button>

  <div id="focusView" class="hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
